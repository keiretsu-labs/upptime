status-website:
  # NOTE: status.keiretsu.top is already owned by the k8gb GSLB (self-hosted gatus/kener).
  # Serving at the github.io path for now; switch to a dedicated subdomain via a GitOps
  # DNS change (e.g. uptime.keiretsu.top) if a custom domain is wanted.
  baseUrl: /upptime
  name: Keiretsu Status
  logoUrl: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/gatus.svg
  introTitle: "Keiretsu Infrastructure Status"
  introMessage: Real-time uptime monitoring for Keiretsu public-facing endpoints across the **Ottawa**, **Robbinsdale**, and **St. Petersburg** clusters. Powered by [Upptime](https://upptime.js.org) — GitHub Actions, Issues, and Pages. No server required.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

