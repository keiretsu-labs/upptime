# Keiretsu Upptime — uptime monitor & status page for public-facing endpoints
# Powered entirely by GitHub Actions, Issues, and Pages. Docs: https://upptime.js.org/docs
owner: keiretsu-labs
repo: upptime

# Public-facing endpoints, grouped by cluster.
# COMMON_DOMAIN endpoints use keiretsu.top; per-cluster endpoints use the cluster domain
# (ottawa=killinit.cc, robbinsdale=lukehouge.com, stpetersburg=rajsingh.info).
# Only publicly-resolvable routes attached to the `public` Gateway are included.
sites:
  # ===== Common (keiretsu.top) =====
  - name: Keiretsu Home
    url: https://keiretsu.top
  - name: Keiretsu WWW
    url: https://www.keiretsu.top
  - name: Garage S3 (CDN)
    url: https://s3.cdn.keiretsu.top
    expectedStatusCodes:
      - 403 # Garage returns 403 at root with no bucket/credentials — healthy

  # ===== Ottawa (killinit.cc) =====
